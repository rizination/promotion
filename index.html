<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ค้นหาโปรโมชั่น</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
  <style>
    :root {
      --blue-dark:  #003a7a;
      --blue:       #0056b3;
      --blue-mid:   #1976D2;
      --blue-light: #d6e9ff;
      --blue-pale:  #EEF4FB;
      --sky:        #4FC3F7;
      --white:      #ffffff;
      --success:    #00897B;
      --success-bg: #E0F2F1;
      --danger:     #D32F2F;
      --danger-bg:  #FFEBEE;
      --text:       #1a2a40;
      --text-muted: #607D8B;
      --radius:     12px;
      --shadow:     0 2px 8px rgba(0,86,179,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--blue-pale);
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 60%, var(--blue-mid) 100%);
      color: var(--white);
      padding: 14px 16px 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 3px 12px rgba(0,0,0,0.25);
    }
    .header-title { font-size: 18px; font-weight: 800; letter-spacing: 0.5px; }
    .header-sub   { font-size: 11px; opacity: 0.75; margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

    /* ─── Container ──────────────────────────────────── */
    .container { padding: 14px 12px; max-width: 540px; margin: auto; }

    /* ─── Scan Box ───────────────────────────────────── */
    .scan-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .scan-label { font-size: 12px; font-weight: 700; color: var(--blue); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; display: block; }

    input[type="text"] {
      width: 100%;
      padding: 13px 14px;
      border-radius: 8px;
      border: 2px solid #c8daf5;
      font-size: 16px;
      font-family: 'Sarabun', sans-serif;
      background: var(--blue-pale);
      color: var(--text);
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--blue); outline: none; background: var(--white); }

    .counter-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 10px 0;
    }
    .counter-badge {
      background: var(--blue-light);
      color: var(--blue-dark);
      font-weight: 800;
      font-size: 20px;
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .counter-text { font-size: 13px; color: var(--text-muted); font-weight: 600; }

    /* ─── Action Row (Check + Clear) ─────────────────── */
    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .btn-check {
      flex: 1;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-mid) 100%);
      color: var(--white);
      border: none;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Sarabun', sans-serif;
      box-shadow: 0 4px 12px rgba(0,86,179,0.3);
      letter-spacing: 0.3px;
      transition: opacity 0.15s;
    }
    .btn-check:active { opacity: 0.85; }

    .btn-clear {
      background: var(--white);
      color: var(--danger);
      border: 2px solid #ffcdd2;
      padding: 15px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Sarabun', sans-serif;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-clear:active { background: var(--danger-bg); }

    /* ─── Quick Search Accordion ─────────────────────── */
    .search-accordion {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .search-accordion-toggle {
      width: 100%;
      background: none;
      border: none;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 0.3px;
    }
    .search-accordion-toggle:active { background: var(--blue-pale); }
    .accordion-arrow {
      font-size: 12px;
      transition: transform 0.25s;
      color: var(--text-muted);
    }
    .accordion-arrow.open { transform: rotate(180deg); }

    .search-accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .search-accordion-body.open { max-height: 800px; overflow-y: auto;}

    .search-inner {
      padding: 0 16px 14px;
      display: flex;
      gap: 8px;
    }
    .search-inner input { flex: 1; }
    .btn-search-go {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-mid) 100%);
      color: var(--white);
      border: none;
      padding: 13px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Sarabun', sans-serif;
      white-space: nowrap;
    }
    .btn-search-go:active { opacity: 0.85; }

    /* ─── Summary Bar ────────────────────────────────── */
    .summary-bar {
      display: none;
      background: var(--white);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      border-left: 5px solid var(--blue);
    }
    .summary-bar.show { display: flex; align-items: center; gap: 0; }
    .summary-title { font-size: 11px; font-weight: 700; color: var(--blue); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .summary-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
    }
    .pill-total   { background: var(--blue-light);  color: var(--blue-dark); }
    .pill-promo   { background: var(--success-bg);  color: var(--success); }
    .pill-nopromo { background: var(--danger-bg);   color: var(--danger); }
    .pill-dot { width: 7px; height: 7px; border-radius: 50%; }
    .pill-total   .pill-dot { background: var(--blue); }
    .pill-promo   .pill-dot { background: var(--success); }
    .pill-nopromo .pill-dot { background: var(--danger); }

    /* ─── List Items ─────────────────────────────────── */
    .list-header {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      letter-spacing: 0.8px; text-transform: uppercase;
      margin-bottom: 8px; padding: 0 2px;
    }

    .list-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: var(--shadow);
      border-left: 5px solid #ccc;
    }
    .list-item.has-promo { border-color: var(--success); cursor: pointer; }
    .list-item.has-promo:active { background: var(--success-bg); }
    .list-item.no-promo  { border-color: var(--danger); opacity: 0.75; }

    .item-num {
      min-width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
      flex-shrink: 0; margin-top: 1px;
    }
    .has-promo .item-num { background: var(--success-bg); color: var(--success); }
    .no-promo  .item-num { background: var(--danger-bg);  color: var(--danger); }

    .item-body { flex: 1; min-width: 0; }
    .item-name { font-weight: 700; font-size: 15px; line-height: 1.3; }
    .item-status { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .item-period {
      font-size: 12px; font-weight: 700; color: var(--blue-mid);
      background: var(--blue-light); display: inline-block;
      padding: 2px 8px; border-radius: 4px; margin-top: 5px;
    }
    .item-price {
      font-weight: 800; font-size: 18px; color: var(--success);
      flex-shrink: 0; padding-top: 2px;
    }
    .no-promo .item-price { color: var(--text-muted); font-size: 14px; }

    /* ─── Pagination ─────────────────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      padding-bottom: 20px;
    }
    .page-btn {
      min-width: 38px; height: 38px;
      border-radius: 8px;
      border: 2px solid var(--blue-light);
      background: var(--white);
      color: var(--blue);
      font-family: 'Sarabun', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: 0.12s;
    }
    .page-btn.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-btn:not(:disabled):not(.active):active { background: var(--blue-light); }
    .page-info { font-size: 12px; color: var(--text-muted); font-weight: 600; }

    /* ─── Loading ────────────────────────────────────── */
    #loading {
      display: none;
      text-align: center;
      padding: 20px;
      font-weight: 700;
      color: var(--blue);
      font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--blue-light);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Viewer Section ─────────────────────────────── */
    #viewerSection { display: none; }

    .btn-back {
      background: var(--white);
      color: var(--blue);
      border: 2px solid var(--blue-light);
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Sarabun', sans-serif;
      width: 100%;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .viewer-title {
      font-size: 16px; font-weight: 800;
      color: var(--blue-dark);
      border-bottom: 3px solid var(--blue);
      padding-bottom: 10px;
      margin-bottom: 14px;
    }
    .img-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .img-preview {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 12px;
      display: block;
      min-height: 120px;
      background: var(--blue-pale);
    }
    .btn-print {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-mid) 100%);
      color: var(--white); border: none;
      padding: 12px; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: 700;
      font-family: 'Sarabun', sans-serif;
      width: 100%;
    }

    .fallback-box {
      background: var(--blue-light);
      padding: 16px;
      border-radius: var(--radius);
      margin-top: 16px;
      margin-bottom: 20px;
      border: 1.5px dashed var(--blue);
    }
    .fallback-title { font-size: 13px; font-weight: 700; color: var(--blue-dark); margin-bottom: 10px; }
    .btn-folder {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-mid) 100%);
      color: var(--white); border: none;
      padding: 12px; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: 700;
      font-family: 'Sarabun', sans-serif;
      width: 100%; margin-top: 10px;
    }
    .folder-link {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; background: var(--white);
      margin-bottom: 6px; border-radius: 8px;
      text-decoration: none; color: var(--blue);
      font-weight: 700; font-size: 14px;
      box-shadow: var(--shadow);
    }

    /* ─── Tomorrow Mode Toggle ───────────────────────── */
    .tomorrow-toggle-wrap {
      margin-bottom: 14px;
    }
    .btn-tomorrow {
      width: 100%;
      padding: 13px 16px;
      border-radius: var(--radius);
      border: 2px solid #e57373;
      background: var(--white);
      color: var(--danger);
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      transition: background 0.15s, color 0.15s;
    }
    .btn-tomorrow.active {
      background: var(--danger);
      color: var(--white);
      border-color: var(--danger);
    }
    .tomorrow-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      background: #ffcdd2;
      color: var(--danger);
      letter-spacing: 0.3px;
    }
    .btn-tomorrow.active .tomorrow-badge {
      background: rgba(255,255,255,0.25);
      color: var(--white);
    }

    /* ─── Folder Bomb (ท่าไม้ตาย) ──────────────────────── */
    .folder-bomb-accordion {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      overflow: hidden;
      border: 2px solid #ffcdd2;
    }
    .folder-bomb-toggle {
      width: 100%;
      background: none;
      border: none;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--danger);
      letter-spacing: 0.3px;
    }
    .folder-bomb-toggle:active { background: var(--danger-bg); }
    .folder-bomb-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .folder-bomb-body.open { max-height: 2000px; }
    .folder-bomb-inner { padding: 0 16px 14px; }
    .btn-load-folders {
      width: 100%;
      background: linear-gradient(135deg, #c62828 0%, #b71c1c 100%);
      color: var(--white);
      border: none;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      font-family: 'Sarabun', sans-serif;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 16px rgba(183,28,28,0.45);
      margin-bottom: 12px;
      transition: opacity 0.15s;
    }
    .btn-load-folders:active { opacity: 0.82; }

    /* ─── Login Section ─────────────────────────────── */
    #loginSection {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--blue-dark) 0%, var(--blue) 50%, var(--blue-mid) 100%);
      padding: 20px;
    }
    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      text-align: center;
    }
    .login-logo  { font-size: 52px; margin-bottom: 12px; }
    .login-title { font-size: 22px; font-weight: 800; color: var(--blue-dark); margin-bottom: 4px; }
    .login-sub   { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 28px; }
    .login-card input[type="text"] {
      text-align: center; font-size: 20px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px;
    }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
      color: var(--white); border: none; padding: 16px; border-radius: 10px;
      font-size: 17px; font-weight: 800; font-family: 'Sarabun', sans-serif;
      cursor: pointer; box-shadow: 0 4px 16px rgba(0,86,179,0.35);
      letter-spacing: 0.5px; transition: opacity 0.15s;
    }
    .btn-login:active { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.5; cursor: default; }
    .login-error {
      margin-top: 14px; padding: 10px 14px;
      background: var(--danger-bg); color: var(--danger);
      border-radius: 8px; font-size: 13px; font-weight: 700;
      display: none; white-space: pre-line;
    }
    .login-loading { margin-top: 12px; color: var(--text-muted); font-size: 13px; font-weight: 600; }

    /* ─── Admin Section ──────────────────────────────── */
    #adminSection { min-height: 100vh; background: var(--blue-pale); font-family: 'Sarabun', sans-serif; }
    .admin-header {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 60%, var(--blue-mid) 100%);
      color: var(--white); padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 3px 12px rgba(0,0,0,0.25);
    }
    .admin-header-title { font-size: 17px; font-weight: 800; }
    .btn-admin-logout {
      background: rgba(255,255,255,0.15); color: var(--white);
      border: 1px solid rgba(255,255,255,0.3); padding: 7px 14px;
      border-radius: 8px; font-size: 13px; font-weight: 700;
      font-family: 'Sarabun', sans-serif; cursor: pointer;
    }
    .admin-tabs {
      display: flex; background: var(--white);
      border-bottom: 2px solid var(--blue-light);
      position: sticky; top: 53px; z-index: 99;
    }
    .admin-tab {
      flex: 1; padding: 13px 6px; border: none; background: none;
      font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--text-muted); cursor: pointer;
      border-bottom: 3px solid transparent; transition: 0.15s;
    }
    .admin-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .admin-tab:active { background: var(--blue-pale); }
    #adminContent { padding: 14px 12px; max-width: 540px; margin: auto; }
    .admin-section {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden;
    }
    .admin-section-title {
      padding: 13px 16px; font-size: 14px; font-weight: 800;
      color: var(--blue-dark); border-bottom: 2px solid var(--blue-light);
      background: var(--blue-pale);
    }
    .admin-loading { padding: 30px; text-align: center; color: var(--text-muted); font-weight: 700; }
    .admin-form { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .form-row { display: flex; gap: 8px; }
    .form-row input { flex: 1; }
    .admin-form input, .admin-form select {
      width: 100%; padding: 11px 14px; border-radius: 8px;
      border: 2px solid #c8daf5; font-size: 15px;
      font-family: 'Sarabun', sans-serif; background: var(--blue-pale); color: var(--text);
    }
    .admin-form input:focus, .admin-form select:focus { border-color: var(--blue); outline: none; background: var(--white); }
    .btn-gen-code {
      background: var(--blue-light); color: var(--blue-dark); border: 2px solid var(--blue-light);
      padding: 11px 12px; border-radius: 8px; font-size: 13px; font-weight: 700;
      font-family: 'Sarabun', sans-serif; cursor: pointer; white-space: nowrap;
    }
    .btn-admin-save {
      width: 100%; background: linear-gradient(135deg, var(--success) 0%, #00796b 100%);
      color: var(--white); border: none; padding: 14px; border-radius: 10px;
      font-size: 16px; font-weight: 700; font-family: 'Sarabun', sans-serif; cursor: pointer;
    }
    .user-card {
      padding: 13px 16px; border-bottom: 1px solid var(--blue-light);
      display: flex; align-items: flex-start; gap: 10px; justify-content: space-between;
    }
    .user-card:last-child { border-bottom: none; }
    .user-info { flex: 1; min-width: 0; }
    .user-code  { font-size: 16px; font-weight: 800; color: var(--blue-dark); letter-spacing: 1px; }
    .user-label { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .user-meta  { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 5px; }
    .user-status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 12px; }
    .status-active  { background: var(--success-bg); color: var(--success); }
    .status-locked  { background: var(--danger-bg);  color: var(--danger); }
    .status-expired { background: #FFF3E0; color: #E65100; }
    .user-expiry { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    .user-fp { font-size: 10px; color: #90A4AE; margin-top: 3px; font-family: monospace; }
    .user-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
    .btn-admin-action {
      padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 700;
      font-family: 'Sarabun', sans-serif; cursor: pointer; border: none; white-space: nowrap;
    }
    .btn-lock   { background: var(--danger-bg);  color: var(--danger); }
    .btn-unlock { background: var(--success-bg); color: var(--success); }
    .btn-reset  { background: #FFF3E0; color: #E65100; }
    .btn-edit   { background: var(--blue-light); color: var(--blue-dark); }
    .btn-delete { background: #ECEFF1; color: #607D8B; }
    .log-card {
      padding: 11px 16px; border-bottom: 1px solid var(--blue-light);
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }

function sbFetch(path) {

// ── Thai date helpers ──────────────────────────────────
var THAI_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

function formatThaiDate(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  return d.getDate() + ' ' + THAI_MONTHS[d.getMonth()] + ' ' + String(d.getFullYear() + 543).slice(-2);
}

function formatThaiDateRange(start, end) {
  return formatThaiDate(start) + ' - ' + formatThaiDate(end);
}

// ── 1) ตรวจโปรจาก barcode ─────────────────────────────
function searchMultipleProductsSupabase(barcodes, tomorrowMode) {
  var barcodeList = barcodes.map(function(b) { return '"' + b + '"'; }).join(',');
  var path = 'promo_items?barcode=in.(' + barcodeList + ')&select=barcode,name,promo_price,start_date,end_date,keyword&limit=5000';

  return sbFetch(path).then(function(rows) {
    var promoMap = {};
    rows.forEach(function(r) { promoMap[r.barcode] = r; });

    var checkDate = new Date();
    if (tomorrowMode) checkDate.setDate(checkDate.getDate() + 1);
    checkDate.setHours(0, 0, 0, 0);

    var result = barcodes.map(function(barcode) {
      var promo = promoMap[barcode];
      if (!promo) return { hasPromo: false, name: barcode, status: 'ไม่พบข้อมูลสินค้า' };

      var start = new Date(promo.start_date + 'T00:00:00');
      var end   = new Date(promo.end_date   + 'T23:59:59');

      if (checkDate >= start && checkDate <= end) {
        return {
          hasPromo:   true,
          name:       promo.name,
          keyword:    promo.keyword,
          isTomorrow: tomorrowMode,
          periodText: formatThaiDateRange(promo.start_date, promo.end_date),
          price:      Number(promo.promo_price).toFixed(2),
          status:     ''
        };
      } else {
        var status = checkDate < start ? 'ยังไม่ถึงช่วงโปร' : 'ไม่มีโปรโมชั่น';
        return { hasPromo: false, name: promo.name, status: status };
      }
    });

    return { success: true, data: result };
  });
}

// ── 2) ค้นหารูปจาก OCR ────────────────────────────────
function searchDriveImageSupabase(keyword) {
  // ── 1) split & กรอง token ──────────────────────────
  var UNIT_PATTERN = /^\d+[\w\.%]*$/;          // 300g, 2KG, 180มล, 7มม, 600
  var UNIT_WORDS   = ["มล","กรัม","กก","มม","kg","g.","g","ml","mm","แพ็คละ","แพ็ค"];

  var filtered = keyword.trim().split(/\s+/).filter(function(t) {
    if (t.length < 3) return false;                            // สั้นเกิน
    if (UNIT_PATTERN.test(t)) return false;                    // ตัวเลข+หน่วย
    if (UNIT_WORDS.indexOf(t.toLowerCase()) !== -1) return false; // คำหน่วย
    return true;
  });

  if (filtered.length === 0)
    return Promise.resolve({ success: true, usedFallback: false, files: [] });

  // ── 2) sliding window สำหรับ token ยาว ─────────────
  var WINDOW = 7, STEP = 4, LONG = 10;
  var tokens = [];

  filtered.forEach(function(t) {
    if (t.length >= LONG) {
      for (var i = 0; i + WINDOW <= t.length; i += STEP)
        tokens.push(t.substring(i, i + WINDOW));
      // เพิ่ม segment ท้ายถ้ายังไม่ครอบคลุม
      var last = t.substring(t.length - WINDOW);
      if (tokens.indexOf(last) === -1) tokens.push(last);
    } else {
      tokens.push(t);
    }
  });

  // dedup
  tokens = tokens.filter(function(t, i, arr) { return arr.indexOf(t) === i; });

  if (tokens.length === 0)
    return Promise.resolve({ success: true, usedFallback: false, files: [] });

  // ── 3) threshold: ต้อง match >= 2 เสมอ ยกเว้น token เดียว ──
  var threshold = tokens.length <= 1 ? 1 : 2;

  // ── 4) OR filter → Supabase ────────────────────────
  var orFilter = tokens.map(function(t) {
    return 'description.ilike.*' + encodeURIComponent(t) + '*';
  }).join(',');

  var path = 'ocr_cache?or=(' + orFilter + ')&select=file_id,folder_id,folder_name,description&limit=5000';

  return sbFetch(path).then(function(rows) {
    var matched = rows.filter(function(row) {
      var desc  = (row.description || '').toLowerCase();
      var count = tokens.filter(function(t) {
        return desc.indexOf(t.toLowerCase()) !== -1;
      }).length;
      return count >= threshold;
    });

    if (matched.length > 0) {
      var files = matched.map(function(row) {
        return {
          thumbnailUrl: 'https://drive.google.com/thumbnail?id=' + row.file_id + '&sz=w800',
          viewUrl:      'https://drive.google.com/file/d/' + row.file_id + '/view',
          folderUrl:    row.folder_id
            ? 'https://drive.google.com/drive/folders/' + row.folder_id
            : null,
        };
      });
      return { success: true, usedFallback: false, files: files };
    }

    // Fallback: คืน folder list
    var folderMap = {};
    rows.forEach(function(row) {
      if (row.folder_id && !folderMap[row.folder_id])
        folderMap[row.folder_id] = row.folder_name;
    });
    var folders = Object.keys(folderMap).map(function(fid) {
      return {
        folderId:  fid,
        folderName: folderMap[fid],
        folderUrl: 'https://drive.google.com/drive/folders/' + fid
      };
    });
    return { success: true, usedFallback: true, folders: folders };
  });
}

// ── 3) ค้นหาโฟลเดอร์จาก keyword ──────────────────────
function searchFolderFallbackSupabase(keyword) {
  var tokens = keyword.trim().split(/\s+/).filter(function(t) { return t.length > 0; });
  if (tokens.length === 0) return Promise.resolve({ success: true, folders: [] });

  var orFilter = tokens.map(function(t) {
    return 'description.ilike.*' + encodeURIComponent(t) + '*';
  }).join(',');

  var path = 'ocr_cache?or=(' + orFilter + ')&select=folder_id,folder_name&limit=5000';

  return sbFetch(path).then(function(rows) {
    var folderMap = {};
    rows.forEach(function(row) {
      if (row.folder_id && !folderMap[row.folder_id]) folderMap[row.folder_id] = row.folder_name;
    });
    var folders = Object.keys(folderMap).map(function(fid) {
      return { url: 'https://drive.google.com/drive/folders/' + fid, name: folderMap[fid] || fid };
    });
    return { success: true, folders: folders };
  });
}

// ── 4) โหลดโฟลเดอร์ทั้งหมด (ท่าไม้ตาย) ──────────────
function getAllTargetFoldersSupabase() {
  var path = 'ocr_cache?select=folder_id,folder_name&limit=5000';

    });
    return { success: true, folders: folders };
  });
}

    function initApp() {

      if (!session) { showLoginSection(); return; }

      sbFetch('access_codes?code=eq.' + encodeURIComponent(session.code) + '&select=*')
        .then(function(rows) {
          if (!rows || rows.length === 0) { clearSession(); showLoginSection(); return; }
          var user = rows[0];
          if (user.status === 'locked')     { clearSession(); showLoginSection('รหัสนี้ถูกระงับการใช้งาน'); return; }
          if (isExpired(user.expires_at))   { clearSession(); showLoginSection('รหัสนี้หมดอายุแล้ว'); return; }
          if (user.device_fp && user.device_fp !== session.fp) { clearSession(); showLoginSection(); return; }
          saveSession({ code: user.code, label: user.label, role: user.role, fp: session.fp, expires_at: user.expires_at });
          if (user.role === 'admin') showAdminSection();
          else showAppSection();
        })
        .catch(function() {
          // Supabase ไม่ตอบ ใช้ cached session
          if (session.role === 'admin') showAdminSection();

            if (isExpired(user.expires_at)) { showLoginError('รหัสนี้หมดอายุแล้ว'); return; }
            if (user.role !== 'admin' && user.device_fp && user.device_fp !== fp) {
              showLoginError('ไม่สามารถใช้รหัสนี้บนเครื่องนี้ได้\nกรุณาติดต่อผู้ดูแลระบบ'); return;
            }
            var patches = [];
            if (!user.device_fp && user.role !== 'admin') patches.push(sbPatch('access_codes?code=eq.' + encodeURIComponent(code), { device_fp: fp }));
            patches.push(sbPost('login_logs', { code: code, label: user.label, device_fp: fp }));
            return Promise.all(patches).then(function() {
              saveSession({ code: user.code, label: user.label, role: user.role, fp: fp, expires_at: user.expires_at });
              if (user.role === 'admin') showAdminSection();
              else showAppSection();
            });
          });
      }).catch(function() {
        showLoginError('เกิดข้อผิดพลาด กรุณาลองใหม่');
      }).finally(function() {
        document.getElementById('loginLoading').style.display = 'none';
        document.querySelector('.btn-login').disabled = false;
      });
    }

    // ── Admin Panel ────────────────────────────────────
    function loadAdminPanel() { switchTab('users'); }

    function switchTab(tab) {
      document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelector('.admin-tab[data-tab="' + tab + '"]').classList.add('active');
      document.getElementById('adminContent').innerHTML = '<div class="admin-loading">⏳ กำลังโหลด...</div>';
      if (tab === 'users')    loadUsersTab();
      else if (tab === 'expiring') loadExpiringTab();
      else if (tab === 'logs')     loadLogsTab();
    }

    function generateCode() {
      var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      var code = '';
      for (var i = 0; i < 4; i++) code += Math.floor(Math.random() * 10);
      for (var i = 0; i < 2; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
      document.getElementById('newCode').value = code;
    }

    function renderAddUserForm() {
      var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 30);
      var defaultExpiry = tomorrow.toISOString().split('T')[0];
      return '<div class="admin-section">' +
        '<div class="admin-section-title">➕ เพิ่มผู้ใช้ใหม่</div>' +
        '<div class="admin-form">' +
        '<div class="form-row">' +
        '<input type="text" id="newCode" placeholder="รหัสผู้ใช้" style="text-transform:uppercase;letter-spacing:2px;font-weight:700">' +
        '<button class="btn-gen-code" onclick="generateCode()">🎲 สร้าง</button>' +
        '</div>' +
        '<input type="text" id="newLabel" placeholder="ชื่อสาขา / ผู้ใช้">' +
        '<select id="newRole"><option value="user">👤 User</option><option value="admin">⚙️ Admin</option></select>' +
        '<input type="date" id="newExpiry" value="' + defaultExpiry + '">' +
        '<button class="btn-admin-save" onclick="addUser()">💾 บันทึก</button>' +
        '</div></div>';
    }

    function renderUserCard(user) {
      var expired = isExpired(user.expires_at);
      var statusClass = user.status === 'locked' ? 'status-locked' : (expired ? 'status-expired' : 'status-active');
      var statusText  = user.status === 'locked' ? '🔒 ระงับ' : (expired ? '⏰ หมดอายุ' : '✅ ใช้งานได้');
      var c = user.code.replace(/'/g, "\\'");
      var l = (user.label || '').replace(/'/g, "\\'");
      var html = '<div class="user-card">';
      html += '<div class="user-info">';
      html += '<div class="user-code">' + user.code + '</div>';
      html += '<div class="user-label">' + (user.label || '—') + '</div>';
      html += '<div class="user-meta">';
      html += '<span class="user-status ' + statusClass + '">' + statusText + '</span>';
      html += '<span class="user-expiry">หมด: ' + formatThaiDate(user.expires_at) + '</span>';
      html += '</div>';
      if (user.device_fp) html += '<div class="user-fp">🖥️ ' + user.device_fp.substring(0, 14) + '...</div>';
      html += '</div>';
      html += '<div class="user-actions">';
      if (user.status === 'locked') {
        html += '<button class="btn-admin-action btn-unlock" onclick="toggleLock(\'' + c + '\',\'active\')">🔓 ปลดล็อค</button>';
      } else {
        html += '<button class="btn-admin-action btn-lock" onclick="toggleLock(\'' + c + '\',\'locked\')">🔒 ล็อค</button>';
      }
      html += '<button class="btn-admin-action btn-reset" onclick="resetDevice(\'' + c + '\')">📱 Reset</button>';
      html += '<button class="btn-admin-action btn-edit" onclick="editUser(\'' + c + '\',\'' + l + '\',\'' + user.expires_at + '\')">✏️ แก้ไข</button>';
      html += '<button class="btn-admin-action btn-delete" onclick="deleteUser(\'' + c + '\')">🗑️ ลบ</button>';
      html += '</div></div>';
      return html;
    }

    function loadUsersTab() {
      sbFetch('access_codes?order=created_at.desc&select=*').then(function(rows) {
        var html = renderAddUserForm();
        html += '<div class="admin-section"><div class="admin-section-title">👥 ผู้ใช้ทั้งหมด (' + rows.length + ')</div>';
        if (rows.length === 0) html += '<p style="padding:20px;text-align:center;color:var(--text-muted);">ยังไม่มีผู้ใช้</p>';
        else rows.forEach(function(u) { html += renderUserCard(u); });
        html += '</div>';
        document.getElementById('adminContent').innerHTML = html;
      }).catch(function() {
        document.getElementById('adminContent').innerHTML = '<div class="admin-loading" style="color:var(--danger)">❌ โหลดไม่สำเร็จ</div>';
      });
    }

    function loadExpiringTab() {
      var today = new Date().toISOString().split('T')[0];
      var in7   = new Date(); in7.setDate(in7.getDate() + 7);
      var in7Str = in7.toISOString().split('T')[0];
      sbFetch('access_codes?expires_at=gte.' + today + '&expires_at=lte.' + in7Str + '&order=expires_at.asc&select=*')
        .then(function(rows) {
          var html = '<div class="admin-section"><div class="admin-section-title">⏰ ใกล้หมดอายุใน 7 วัน (' + rows.length + ')</div>';
          if (rows.length === 0) html += '<p style="padding:20px;text-align:center;color:var(--success);">✅ ไม่มีผู้ใช้ที่ใกล้หมดอายุ</p>';
          else rows.forEach(function(u) { html += renderUserCard(u); });
          html += '</div>';
          document.getElementById('adminContent').innerHTML = html;
        });

    function loadLogsTab() {
      sbFetch('login_logs?order=logged_in_at.desc&limit=50&select=*').then(function(rows) {
        var html = '<div class="admin-section"><div class="admin-section-title">📋 ประวัติ Login ล่าสุด (' + rows.length + ')</div>';
        if (rows.length === 0) html += '<p style="padding:20px;text-align:center;color:var(--text-muted);">ยังไม่มี log</p>';
        rows.forEach(function(r) {
          var dt = new Date(r.logged_in_at);
          var dateStr = dt.toLocaleDateString('th-TH', { day:'2-digit', month:'short', year:'2-digit' });
          var timeStr = dt.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });

          html += '<div><div class="log-code">' + r.code + '</div><div class="log-label">' + (r.label || '—') + '</div></div>';
          html += '<div class="log-time">' + dateStr + '<br>' + timeStr + '</div>';
          html += '</div>';
        });
        html += '</div>';
        document.getElementById('adminContent').innerHTML = html;
      });
    }

    function toggleLock(code, newStatus) {
      sbPatch('access_codes?code=eq.' + encodeURIComponent(code), { status: newStatus })
        .then(function() { switchTab('users'); });
    }
    function resetDevice(code) {
      if (!confirm('Reset device fingerprint สำหรับ\n' + code + '\n\nผู้ใช้จะสามารถ login จากเครื่องใหม่ได้ครั้งหนึ่ง')) return;
      sbPatch('access_codes?code=eq.' + encodeURIComponent(code), { device_fp: null })
        .then(function() { switchTab('users'); });
    }
    function deleteUser(code) {
      if (!confirm('ลบผู้ใช้ ' + code + ' ออกจากระบบ?\nไม่สามารถย้อนกลับได้')) return;
      sbDeleteRow('access_codes?code=eq.' + encodeURIComponent(code))
        .then(function() { switchTab('users'); });
    }
    function editUser(code, label, expiresAt) {
      var newLabel = prompt('ชื่อสาขา / ผู้ใช้:', label);
      if (newLabel === null) return;
      var newExpiry = prompt('วันหมดอายุ (YYYY-MM-DD):', expiresAt);
      if (!newExpiry) return;
      sbPatch('access_codes?code=eq.' + encodeURIComponent(code), { label: newLabel, expires_at: newExpiry })
        .then(function() { switchTab('users'); });
    }
    function addUser() {
      var code   = (document.getElementById('newCode').value || '').trim().toUpperCase();
      var label  = (document.getElementById('newLabel').value || '').trim();
      var role   = document.getElementById('newRole').value;
      var expiry = document.getElementById('newExpiry').value;
      if (!code || !expiry) { alert('กรุณากรอก รหัส และ วันหมดอายุ'); return; }
      sbPost('access_codes', { code: code, label: label, role: role, expires_at: expiry })
        .then(function() { switchTab('users'); });
    }

    // ─── Setup App Event Listeners (เรียกจาก showAppSection) ─
    var _appListenersReady = false;
    function setupAppListeners() {
      if (_appListenersReady) return;
      _appListenersReady = true;
      var input = document.getElementById('barcode');
      input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          var val = input.value.trim();
          if (val && scannedBarcodes.indexOf(val) === -1) {
            scannedBarcodes.push(val);
            document.getElementById('scanCount').innerText = scannedBarcodes.length;
            saveToLocal();
          }
          input.value = '';
          input.focus();
        }
      });
      document.getElementById('quickSearch').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); quickSearchImage(); }
      });
    }

    initApp();

    // ─── Clear barcode list ────────────────────────────
    function confirmClear() {
      if (scannedBarcodes.length === 0) {
        alert('ไม่มีรายการที่จะลบครับ');
        return;
      }
      if (confirm('ต้องการล้างรายการ ' + scannedBarcodes.length + ' รายการใช่ไหมครับ?\n\nการดำเนินการนี้ไม่สามารถย้อนกลับได้')) {
        scannedBarcodes = [];
        document.getElementById('scanCount').innerText = 0;
        saveToLocal();
        // ล้าง UI ด้วย
        document.getElementById('summaryList').innerHTML = '';
        document.getElementById('paginationBar').innerHTML = '';
        document.getElementById('summaryBar').classList.remove('show');
        document.getElementById('listHeader').style.display = 'none';
        allItems = [];
      }
    }

    // ─── Accordion toggle ──────────────────────────────
    function toggleSearchBox() {
      var body  = document.getElementById('searchAccordionBody');
      var arrow = document.getElementById('accordionArrow');
      var isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);

    // ─── Quick Search (ค้นหาจากชื่อสินค้าโดยตรง) ──────
    function quickSearchImage() {
      var kw = document.getElementById('quickSearch').value.trim();

      openImageViewer(kw, kw);

    // ─── Check Promotions ──────────────────────────────
    function checkPromotions() {
      if (scannedBarcodes.length === 0) { alert('กรุณาสแกนสินค้าอย่างน้อย 1 รายการครับ'); return; }
      showLoading('กำลังประมวลผล กรุณารอสักครู่...');
      document.getElementById('summaryList').innerHTML = '';
      document.getElementById('paginationBar').innerHTML = '';
      document.getElementById('summaryBar').classList.remove('show');
      document.getElementById('listHeader').style.display = 'none';
      searchMultipleProductsSupabase(scannedBarcodes, tomorrowMode)
    .then(renderSummary)
    .catch(function(e) { hideLoading(); alert('เกิดข้อผิดพลาด: ' + e.toString()); });
    }

    function renderSummary(res) {
      hideLoading();
      if (!res.success) { alert(res.message); return; }

      allItems = res.data;
      currentPage = 1;

      var total = allItems.length;
      var promoCount = 0, noPromoCount = 0;
      for (var i = 0; i < allItems.length; i++) {
        if (allItems[i].hasPromo) promoCount++; else noPromoCount++;
      }
      document.getElementById('sumTotal').innerText   = total;
      document.getElementById('sumPromo').innerText   = promoCount;
      document.getElementById('sumNoPromo').innerText = noPromoCount;
      document.getElementById('summaryBar').classList.add('show');
      document.getElementById('listHeader').style.display = 'block';

      renderPage(currentPage);

      // ล้าง barcode หลังตรวจสอบเสร็จ
      scannedBarcodes = [];
      document.getElementById('scanCount').innerText = 0;
      saveToLocal();
    }

    function renderPage(page) {
      var start = (page - 1) * PAGE_SIZE;
      var end   = Math.min(start + PAGE_SIZE, allItems.length);
      var pageItems = allItems.slice(start, end);

      var listContainer = document.getElementById('summaryList');
      listContainer.innerHTML = '';

      for (var i = 0; i < pageItems.length; i++) {
        var item = pageItems[i];
        var globalNum = start + i + 1;
        var div = document.createElement('div');

        if (item.hasPromo) {
          div.className = 'list-item has-promo';
          div.setAttribute('data-keyword', item.keyword);
          div.setAttribute('data-name', item.name);
          div.onclick = (function(n, k) {
            return function() { openImageViewer(n, k); };
          })(item.name, item.keyword);
          div.innerHTML =
            '<div class="item-num">' + globalNum + '</div>' +
            '<div class="item-body">' +
              '<div class="item-name">' + item.name + '</div>' +
              '<div class="item-status">✔️ ' + (item.isTomorrow ? 'มีโปรพรุ่งนี้ — แตะเพื่อดูรูป' : 'แตะเพื่อดูรูปโปรโมชั่น') + '</div>' +
              '<div class="item-period">📅 ' + item.periodText + '</div>' +
            '</div>' +
            '<div class="item-price">฿' + item.price + '</div>';
        } else {
          div.className = 'list-item no-promo';
          div.innerHTML =
            '<div class="item-num">' + globalNum + '</div>' +
            '<div class="item-body">' +
              '<div class="item-name">' + item.name + '</div>' +
              '<div class="item-status">❌ ' + item.status + '</div>' +
            '</div>';
        }
        listContainer.appendChild(div);
      }
      renderPagination(page);
    }

    function renderPagination(page) {
      var totalPages = Math.ceil(allItems.length / PAGE_SIZE);
      var bar = document.getElementById('paginationBar');
      bar.innerHTML = '';
      if (totalPages <= 1) return;

      var prev = document.createElement('button');
      prev.className = 'page-btn';
      prev.innerText = '◀';
      prev.disabled = (page === 1);
      prev.onclick = function() { changePage(page - 1); };
      bar.appendChild(prev);

      var rangeStart = Math.max(1, page - 2);
      var rangeEnd   = Math.min(totalPages, page + 2);
      for (var p = rangeStart; p <= rangeEnd; p++) {
        var btn = document.createElement('button');
        btn.className = 'page-btn' + (p === page ? ' active' : '');
        btn.innerText = p;
        (function(pg) { btn.onclick = function() { changePage(pg); }; })(p);
        bar.appendChild(btn);
      }

      var next = document.createElement('button');
      next.className = 'page-btn';
      next.innerText = '▶';
      next.disabled = (page === totalPages);
      next.onclick = function() { changePage(page + 1); };
      bar.appendChild(next);

      var info = document.createElement('span');
      info.className = 'page-info';
      info.style.cssText = 'width:100%;text-align:center;display:block;margin-top:6px;';
      info.innerText = 'หน้า ' + page + ' / ' + totalPages + '  (' + allItems.length + ' รายการ)';
      bar.appendChild(info);
    }

    function changePage(page) {
      currentPage = page;
      renderPage(page);
      window.scrollTo(0, 0);
    }

    // ─── Image Viewer ──────────────────────────────────────
    function openImageViewer(name, keyword) {
      document.getElementById('scanSection').style.display = 'none';
      document.getElementById('viewerSection').style.display = 'block';
      document.getElementById('viewTitle').innerText = name;
      document.getElementById('imgContainer').innerHTML = '';
      document.getElementById('folderResults').innerHTML = '';
      document.getElementById('manualKeyword').value = keyword;

      showLoading('🔍 กำลังค้นหารูปโปรโมชั่น โปรดรอสักครู่...');
      searchDriveImageSupabase(keyword)
    .then(renderImages)
    .catch(function(e) { hideLoading(); alert('เกิดข้อผิดพลาด: ' + e.toString()); });
    }

    function renderImages(res) {
      hideLoading();
      var container = document.getElementById('imgContainer');
      container.innerHTML = '';

      // ── ก๊อก 2: ไม่เจอรูปเลย → แสดง folder list ──
      if (res.success && res.usedFallback) {
        var header = document.createElement('div');
        header.style.cssText = 'padding:14px 0 10px;font-weight:800;color:var(--blue-dark);font-size:15px;';
        header.innerText = '📁 ไม่พบรูปใน Index — เลือกโฟลเดอร์เพื่อค้นหาต่อ';
        container.appendChild(header);

        if (res.folders && res.folders.length > 0) {
          for (var j = 0; j < res.folders.length; j++) {
            var f = res.folders[j];
            var a = document.createElement('a');
            a.href = f.folderUrl;
            a.target = '_blank';
            a.className = 'folder-link';
            a.innerHTML = '📁 ' + (f.folderName || f.folderId);
            container.appendChild(a);
          }
        } else {
          container.innerHTML += '<p style="color:var(--text-muted);text-align:center;padding:10px;">ไม่พบโฟลเดอร์ใน Target</p>';
        }
        return;
      }

      // ── ก๊อก 1: มีรูป → แสดงรูป ──
      if (res.success && res.files && res.files.length > 0) {
        var countBar = document.createElement('div');
        countBar.style.cssText = 'font-size:12px;color:var(--text-muted);font-weight:700;padding:4px 2px 10px;';
        countBar.innerText = 'พบ ' + res.files.length + ' รูป — เลื่อนดูได้เลย';
        container.appendChild(countBar);

        for (var i = 0; i < res.files.length; i++) {
          var file = res.files[i];
          var card = document.createElement('div');
          card.className = 'img-card';

          var img = document.createElement('img');
          img.className = 'img-preview';
          img.src = file.thumbnailUrl;
          img.alt = 'รูปโปรโมชั่น';
          img.onerror = function() {
            this.style.display = 'none';
            var err = document.createElement('div');
            err.className = 'img-error';
            err.innerText = '⚠️ โหลดรูปไม่ได้ กรุณาเปิดต้นฉบับ';
            this.parentNode.insertBefore(err, this);
          };

          // ปุ่มเปิดต้นฉบับ
          var btn = document.createElement('button');
          btn.className = 'btn-print';
          btn.innerText = '🖨️ เปิดภาพต้นฉบับเพื่อพิมพ์';
          btn.onclick = (function(url) {
            return function() { window.open(url, '_blank'); };
          })(file.viewUrl);

          card.appendChild(img);
          card.appendChild(btn);

          // ปุ่มโฟลเดอร์ต้นทาง (ถ้ามี)
          if (file.folderUrl) {
            var btnFolder = document.createElement('a');
            btnFolder.href = file.folderUrl;
            btnFolder.target = '_blank';
            btnFolder.className = 'folder-link';
            btnFolder.style.marginTop = '8px';
            btnFolder.innerText = '📁 เปิดโฟลเดอร์ต้นทาง';
            card.appendChild(btnFolder);
          }

          container.appendChild(card);
        }
      } else {
        // ไม่น่าเกิด แต่ safety net
        container.innerHTML =
          '<p style="color:var(--danger);text-align:center;padding:16px 0;font-weight:700;">❌ ไม่พบรูปภาพจาก Keyword นี้</p>';
      }
    }

      getAllTargetFoldersSupabase()
    .then(renderFolderBomb)
    .catch(function(e) {
      list.innerHTML = '<p style="color:var(--danger);text-align:center;">❌ เกิดข้อผิดพลาด: ' + e.message + '</p>';
    });
    }

    function renderFolderBomb(res) {
      var list = document.getElementById('folderBombList');
      list.innerHTML = '';
      if (!res.success || !res.folders || res.folders.length === 0) {
        list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:10px;">ไม่พบโฟลเดอร์</p>';
        return;
      }
      var header = document.createElement('div');
      header.style.cssText = 'font-size:12px;color:var(--danger);font-weight:700;padding:4px 2px 10px;letter-spacing:0.5px;';
      header.innerText = 'พบ ' + res.folders.length + ' โฟลเดอร์ — แตะเพื่อเปิด';
      list.appendChild(header);
      for (var i = 0; i < res.folders.length; i++) {
        var f = res.folders[i];
        var a = document.createElement('a');
        a.href = f.folderUrl;
        a.target = '_blank';
        a.className = 'folder-link';
        a.innerHTML = '📁 ' + (f.folderName || f.folderId);
        list.appendChild(a);
      }
    }

    // ─── Back ──────────────────────────────────────────────
    function goBack() {
      document.getElementById('viewerSection').style.display = 'none';
      document.getElementById('scanSection').style.display = 'block';
      document.getElementById('barcode').focus();
    }

    // ─── Loading Helpers ───────────────────────────────────
    function showLoading(msg) {
      document.getElementById('loadingText').innerText = msg || 'กำลังประมวลผล...';
      document.getElementById('loading').style.display = 'block';
    }
    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }
  </script>
</body>
</html>
